<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Gradient canvas over Ultra HDR pixel</title>
  <style>
    body {
      margin: 0;
      padding: 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      background: #ffffff;
      font-family: sans-serif;
    }

    .cell {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .cell span {
      font-size: 13px;
      color: #444;
    }

    .box {
      position: relative;
      width: 1000px;
      height: 577px;
      overflow: hidden;
    }

    .box img {
      position: absolute;
      top: -1px;
      left: -1px;
      width: calc(100% + 2px);
      height: calc(100% + 2px);
      object-fit: fill;
    }

    .box video {
      position: absolute;
      top: -1px;
      left: -1px;
      width: calc(100% + 2px);
      height: calc(100% + 2px);
      object-fit: fill;
    }

    .box canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
      pointer-events: none;
    }

    .box canvas.blend {
      mix-blend-mode: multiply;
    }

    .box video.blend {
      mix-blend-mode: overlay;
    }

    .test-gradient {
      height: 100px;
      width: 1000px;
      background: linear-gradient(90deg, color(display-p3 1 0 0), color(display-p3 0 0 0));
    }
  </style>
</head>

<body>
  <div id="grid">
    <div class="cell">
      <div class="test-gradient"></div>
    </div>
  </div>
  <script>
    (() => {
      const isSafari = "GestureEvent" in window;
      var variants = [
        // { space: 'display-p3', method: 'pixel', label: 'display-p3 (per-pixel column fill)' },
        { space: 'display-p3', method: 'gradient', label: 'display-p3 (createLinearGradient)' },
        { space: 'display-p3', method: 'img', label: 'img: display-p3 (createLinearGradient)' },
        // { space: 'display-p3', method: 'dither', label: 'display-p3 (per-pixel + 8x8 Bayer dither)' }
      ];
      var contextColorSpaces = { 'display-p3': 'display-p3' };

      var bayer8 = [
        [0, 32, 8, 40, 2, 34, 10, 42],
        [48, 16, 56, 24, 50, 18, 58, 26],
        [12, 44, 4, 36, 14, 46, 6, 38],
        [60, 28, 52, 20, 62, 30, 54, 22],
        [3, 35, 11, 43, 1, 33, 9, 41],
        [51, 19, 59, 27, 49, 17, 57, 25],
        [15, 47, 7, 39, 13, 45, 5, 37],
        [63, 31, 55, 23, 61, 29, 53, 21]
      ];
      var bayerN = 8;
      function bayerThreshold(x, y) {
        return (bayer8[y % bayerN][x % bayerN] + 0.5) / (bayerN * bayerN);
      }
      var grid = document.getElementById('grid');
      grid.style.display = 'flex';
      grid.style.flexWrap = 'wrap';
      grid.style.gap = '20px';

      variants.forEach((variant) => {
        var space = variant.space;
        var method = variant.method;

        var cell = document.createElement('div');
        cell.className = 'cell';

        var label = document.createElement('span');
        label.textContent = variant.label;
        cell.appendChild(label);

        var box = document.createElement('div');
        box.className = 'box';

        var video
        if (method === 'img') {
          video = document.createElement('img');
          video.src = '1x1_%23FFFFFFFF-ultrahdr.jpg'
        } else {
          video = document.createElement('video');
          video.width = 640;
          video.height = 200;
          video.setAttribute('poster', 'videos/white.png');
          video.setAttribute('preload', '');
          video.autoplay = true;
          video.loop = true;
          video.muted = true;
          // video.controls = true;

          var source1 = document.createElement('source');
          source1.src = 'videos/white1.webm';
          source1.type = 'video/webm';
          video.appendChild(source1);

          var source2 = document.createElement('source');
          source2.src = 'videos/white1.mp4';
          source2.type = 'video/mp4';
          video.appendChild(source2);

          var source3 = document.createElement('source');
          source3.src = 'videos/white2.mp4';
          source3.type = 'video/mp4';
          video.appendChild(source3);

          video.appendChild(document.createTextNode('Turn on JavaScript to see the video.'));
        }

        var canvas = document.createElement('canvas');


        if (method === 'gradient' || method === 'img') {
          if (isSafari) {
            video.classList.add('blend');
            box.appendChild(canvas);
            box.appendChild(video);
          } else {
            canvas.classList.add('blend');
            box.appendChild(video);
            box.appendChild(canvas);
          }
        } else {
          box.appendChild(video);
          box.appendChild(canvas);
        }

        cell.appendChild(box);
        grid.appendChild(cell);

        if (method === 'gradient') {
          setTimeout(() => {
            var videoElement = cell.querySelector('video');
            videoElement.duration = 1;
            videoElement.play();
            videoElement.pause();
          }, 0)
        }

        function draw() {
          var displayW = box.clientWidth;
          var displayH = box.clientHeight;
          var dpr = window.devicePixelRatio || 1;
          var w = Math.round(displayW * dpr);
          var h = Math.round(displayH * dpr);
          canvas.width = w;
          canvas.height = h;
          var ctxOptions = {};
          if (contextColorSpaces[space]) {
            ctxOptions.colorSpace = contextColorSpaces[space];
          }
          var ctx = canvas.getContext('2d', ctxOptions);
          ctx.clearRect(0, 0, w, h);
          if (method === 'gradient') {
            var grad = ctx.createLinearGradient(0, 0, w, 0);
            var endValue = isSafari ? '0' : '0.0125';
            grad.addColorStop(0, `color(${space} 0.5 0 0 / 1)`);
            grad.addColorStop(1, `color(${space} ${endValue} 0 0 / 1)`);
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);
          } else if (method === 'img') {
            var grad = ctx.createLinearGradient(0, 0, w, 0);
            var endValue = isSafari ? '0' : '0.0125';
            grad.addColorStop(0, `color(${space} 1 0 0 / 1)`);
            grad.addColorStop(1, `color(${space} ${endValue} 0 0 / 1)`);
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);
          }
        }
        draw();
        window.addEventListener('resize', draw);
      });
    })();
  </script>
</body>

</html>
