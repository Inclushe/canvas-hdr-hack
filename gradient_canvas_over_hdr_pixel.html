<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Gradient canvas over Ultra HDR pixel</title>
  <style>
    body {
      margin: 0;
      padding: 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      background: #ffffff;
      font-family: sans-serif;
    }

    .cell {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .cell span {
      font-size: 13px;
      color: #444;
    }

    .box {
      position: relative;
      width: 1000px;
      height: 577px;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid #ccc;
    }

    .box video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: fill;
      z-index: -1;
    }

    .box canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
    }
  </style>
</head>

<body>
  <div id="grid"></div>
  <script>
    (function () {
      var variants = [
        { space: 'display-p3', method: 'pixel', label: 'display-p3 (per-pixel column fill)' },
        { space: 'display-p3', method: 'gradient', label: 'display-p3 (createLinearGradient)' }
      ];
      var contextColorSpaces = { 'display-p3': 'display-p3' };
      var grid = document.getElementById('grid');
      grid.style.display = 'flex';
      grid.style.flexWrap = 'wrap';
      grid.style.gap = '20px';

      variants.forEach(function (variant) {
        var space = variant.space;
        var method = variant.method;

        var cell = document.createElement('div');
        cell.className = 'cell';

        var label = document.createElement('span');
        label.textContent = variant.label;
        cell.appendChild(label);

        var box = document.createElement('div');
        box.className = 'box';

        var video = document.createElement('video');
        video.width = 640;
        video.height = 200;
        video.setAttribute('poster', 'videos/white.png');
        video.setAttribute('preload', '');
        video.autoplay = true;
        video.loop = true;
        video.muted = true;
        video.className = 'h-1 w-full';
        video.title = 'HDR Video';

        var source1 = document.createElement('source');
        source1.src = 'videos/white1.webm';
        source1.type = 'video/webm';
        video.appendChild(source1);

        var source2 = document.createElement('source');
        source2.src = 'videos/white1.mp4';
        source2.type = 'video/mp4';
        video.appendChild(source2);

        var source3 = document.createElement('source');
        source3.src = 'videos/white2.mp4';
        source3.type = 'video/mp4';
        video.appendChild(source3);

        video.appendChild(document.createTextNode('Turn on JavaScript to see the video.'));
        box.appendChild(video);

        var canvas = document.createElement('canvas');
        box.appendChild(canvas);

        cell.appendChild(box);
        grid.appendChild(cell);

        function draw() {
          var displayW = box.clientWidth;
          var displayH = box.clientHeight;
          var dpr = window.devicePixelRatio || 1;
          var w = Math.round(displayW * dpr);
          var h = Math.round(displayH * dpr);
          canvas.width = w;
          canvas.height = h;
          var ctxOptions = {};
          if (contextColorSpaces[space]) {
            ctxOptions.colorSpace = contextColorSpaces[space];
          }
          var ctx = canvas.getContext('2d', ctxOptions);
          ctx.clearRect(0, 0, w, h);
          if (method === 'gradient') {
            var grad = ctx.createLinearGradient(0, 0, w, 0);
            grad.addColorStop(0, 'color(' + space + ' 0 0 0 / 0)');
            grad.addColorStop(1, 'color(' + space + ' 0 0 0 / 1)');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);
          } else {
            for (var x = 0; x < w; x++) {
              var alpha = w > 1 ? x / (w - 1) : 1;
              ctx.fillStyle = 'color(' + space + ' 0 0 0 / ' + alpha + ')';
              ctx.fillRect(x, 0, 1, h);
            }
          }
        }
        draw();
        window.addEventListener('resize', draw);
      });
    })();
  </script>
</body>

</html>
